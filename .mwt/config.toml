version = 1
default_branch = "main"
default_remote = "origin"
task_worktree_dir_template = "{{ seed_parent }}/{{ repo }}-wt-{{ slug }}-{{ shortid }}"
task_branch_template = "wt/{{ slug }}/{{ shortid }}"

[bootstrap]
enabled = true
default_profile = "local"

[bootstrap.profiles.local]
include = [ ".env", ".env.local", ".env.*.local" ]
exclude = [ "node_modules/", ".venv/", ".next/", "dist/" ]

[verify]
# Content-only repo: mirror the CI markdownlint step so mwt deliver
# performs the same gating check before promoting changes to main.
command = "npx --yes markdownlint-cli \"**/*.md\" --config .markdownlint.json --ignore AGENTS.md"

[policy]
allow_ignored_seed_changes = true
allow_tracked_seed_changes = false

