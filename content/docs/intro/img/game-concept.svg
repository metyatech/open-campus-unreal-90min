<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="charBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA0E6"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD966"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <linearGradient id="goalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DDB80"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Blueprint grid lines (subtle) -->
  <g stroke="#CBD5E1" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="80" x2="800" y2="80" stroke-dasharray="8,6"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-dasharray="8,6"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke-dasharray="8,6"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke-dasharray="8,6"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke-dasharray="8,6"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke-dasharray="8,6"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke-dasharray="8,6"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke-dasharray="8,6"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke-dasharray="8,6"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke-dasharray="8,6"/>
  </g>

  <!-- Blueprint node connections -->
  <g stroke="#94A3B8" stroke-width="1.2" opacity="0.25" fill="none" stroke-dasharray="6,4">
    <path d="M80,100 C150,100 150,180 200,160"/>
    <path d="M200,160 L300,120"/>
    <path d="M300,120 C350,110 380,200 420,180"/>
    <path d="M500,100 L580,140"/>
    <path d="M580,140 C620,160 640,80 700,100"/>
    <path d="M120,300 L220,270"/>
    <path d="M220,270 C280,250 320,310 380,290"/>
    <path d="M520,280 L620,250"/>
    <path d="M620,250 C660,240 680,300 720,280"/>
  </g>

  <!-- Blueprint connection nodes -->
  <g fill="#94A3B8" opacity="0.3">
    <circle cx="80" cy="100" r="4"/>
    <circle cx="200" cy="160" r="4"/>
    <circle cx="300" cy="120" r="4"/>
    <circle cx="420" cy="180" r="4"/>
    <circle cx="500" cy="100" r="4"/>
    <circle cx="580" cy="140" r="4"/>
    <circle cx="700" cy="100" r="4"/>
    <circle cx="120" cy="300" r="4"/>
    <circle cx="220" cy="270" r="4"/>
    <circle cx="380" cy="290" r="4"/>
    <circle cx="520" cy="280" r="4"/>
    <circle cx="620" cy="250" r="4"/>
    <circle cx="720" cy="280" r="4"/>
  </g>

  <!-- Ground / platform -->
  <rect x="60" y="330" width="680" height="12" rx="6" fill="#D1D9E6" opacity="0.5"/>
  <rect x="100" y="328" width="600" height="4" rx="2" fill="#B8C4D6" opacity="0.3"/>

  <!-- Goal arch (right side) -->
  <g filter="url(#shadow)" transform="translate(640, 220)">
    <!-- Arch poles -->
    <rect x="0" y="20" width="10" height="100" rx="3" fill="url(#goalGrad)"/>
    <rect x="70" y="20" width="10" height="100" rx="3" fill="url(#goalGrad)"/>
    <!-- Arch top -->
    <rect x="-5" y="10" width="90" height="14" rx="5" fill="url(#goalGrad)"/>
    <!-- Banner / checkered pattern -->
    <rect x="10" y="28" width="60" height="20" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="10" y="28" width="15" height="10" fill="#2ECC71" opacity="0.6"/>
    <rect x="25" y="38" width="15" height="10" fill="#2ECC71" opacity="0.6"/>
    <rect x="40" y="28" width="15" height="10" fill="#2ECC71" opacity="0.6"/>
    <rect x="55" y="38" width="15" height="10" fill="#2ECC71" opacity="0.6"/>
    <!-- Flag on top -->
    <rect x="35" y="-20" width="3" height="32" rx="1" fill="#27AE60"/>
    <polygon points="38,-20 62,-12 38,-4" fill="#2ECC71"/>
    <!-- Sparkle on flag -->
    <circle cx="50" cy="-12" r="2" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Floating Stars / Gems -->
  <!-- Star 1 (top left area) -->
  <g filter="url(#glow)" transform="translate(180, 120)">
    <polygon points="0,-18 5,-6 18,-6 8,3 12,16 0,8 -12,16 -8,3 -18,-6 -5,-6" fill="url(#starGrad)" stroke="#E8B830" stroke-width="0.5"/>
    <circle cx="0" cy="-2" r="4" fill="#FFFFFF" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="180,120;180,112;180,120" dur="2.5s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Star 2 (upper center) -->
  <g filter="url(#glow)" transform="translate(340, 90)">
    <polygon points="0,-16 4.5,-5.5 16,-5.5 7,2.5 10.5,14 0,7 -10.5,14 -7,2.5 -16,-5.5 -4.5,-5.5" fill="url(#starGrad)" stroke="#E8B830" stroke-width="0.5"/>
    <circle cx="0" cy="-1" r="3.5" fill="#FFFFFF" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="340,90;340,82;340,90" dur="3s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Star 3 (center-right, above character path) -->
  <g filter="url(#glow)" transform="translate(490, 130)">
    <polygon points="0,-20 6,-7 20,-7 9,3 13,18 0,9 -13,18 -9,3 -20,-7 -6,-7" fill="url(#starGrad)" stroke="#E8B830" stroke-width="0.5"/>
    <circle cx="0" cy="-2" r="4.5" fill="#FFFFFF" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="490,130;490,120;490,130" dur="2.8s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Star 4 (lower left) -->
  <g filter="url(#glow)" transform="translate(140, 250)">
    <polygon points="0,-14 4,-5 14,-5 6,2 9,12 0,6 -9,12 -6,2 -14,-5 -4,-5" fill="url(#starGrad)" stroke="#E8B830" stroke-width="0.5"/>
    <circle cx="0" cy="-1" r="3" fill="#FFFFFF" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="140,250;140,243;140,250" dur="2.2s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Star 5 (right side, near goal) -->
  <g filter="url(#glow)" transform="translate(590, 190)">
    <polygon points="0,-15 4.5,-5.5 15,-5.5 7,2 10,13 0,7 -10,13 -7,2 -15,-5.5 -4.5,-5.5" fill="url(#starGrad)" stroke="#E8B830" stroke-width="0.5"/>
    <circle cx="0" cy="-1" r="3.2" fill="#FFFFFF" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="590,190;590,183;590,190" dur="3.2s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Sparkle particles -->
  <g fill="#F5C842" opacity="0.4">
    <circle cx="200" cy="145" r="1.5"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="110" r="1.2"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="510" cy="150" r="1.8"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="230" r="1"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="210" r="1.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Character (running, center) -->
  <g filter="url(#shadow)" transform="translate(370, 260)">
    <!-- Character shadow on ground -->
    <ellipse cx="5" cy="72" rx="28" ry="5" fill="#000" opacity="0.08"/>

    <!-- Back leg (behind, in stride) -->
    <g>
      <!-- Thigh -->
      <rect x="-2" y="32" width="11" height="22" rx="5" fill="#3A7BC8" transform="rotate(-30, 4, 32)"/>
      <!-- Shin -->
      <rect x="-12" y="48" width="10" height="18" rx="4" fill="#3A7BC8" transform="rotate(10, -7, 48)"/>
      <!-- Foot -->
      <ellipse cx="-14" cy="65" rx="8" ry="4" fill="#2D6AB5"/>
    </g>

    <!-- Body (torso - rounded rectangle) -->
    <rect x="-14" y="2" width="36" height="34" rx="10" fill="url(#charBody)"/>
    <!-- Body highlight -->
    <rect x="-8" y="6" width="14" height="20" rx="7" fill="#FFFFFF" opacity="0.15"/>

    <!-- Front leg (in stride, forward) -->
    <g>
      <!-- Thigh -->
      <rect x="4" y="32" width="11" height="22" rx="5" fill="#4A90D9" transform="rotate(25, 10, 32)"/>
      <!-- Shin -->
      <rect x="18" y="46" width="10" height="18" rx="4" fill="#4A90D9" transform="rotate(-15, 23, 46)"/>
      <!-- Foot -->
      <ellipse cx="22" cy="63" rx="9" ry="4.5" fill="#3A7BC8"/>
    </g>

    <!-- Back arm -->
    <rect x="-10" y="8" width="9" height="20" rx="4" fill="#3A7BC8" transform="rotate(30, -5, 8)"/>

    <!-- Head -->
    <circle cx="8" cy="-12" r="18" fill="url(#charBody)"/>
    <!-- Head highlight -->
    <circle cx="2" cy="-18" r="8" fill="#FFFFFF" opacity="0.12"/>

    <!-- Eyes -->
    <ellipse cx="14" cy="-16" rx="4" ry="4.5" fill="#FFFFFF"/>
    <circle cx="15.5" cy="-15.5" r="2.5" fill="#1A1A2E"/>
    <circle cx="16.5" cy="-16.5" r="1" fill="#FFFFFF"/>

    <ellipse cx="2" cy="-15" rx="3.5" ry="4" fill="#FFFFFF"/>
    <circle cx="3" cy="-14.5" r="2.2" fill="#1A1A2E"/>
    <circle cx="3.8" cy="-15.5" r="0.8" fill="#FFFFFF"/>

    <!-- Smile -->
    <path d="M5,-6 Q10,-3 16,-5" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="19" cy="-8" rx="4" ry="2.5" fill="#FF9999" opacity="0.25"/>
    <ellipse cx="-3" cy="-7" rx="3.5" ry="2.5" fill="#FF9999" opacity="0.2"/>

    <!-- Front arm (reaching forward) -->
    <rect x="14" y="6" width="9" height="22" rx="4" fill="#4A90D9" transform="rotate(-35, 18, 6)"/>
    <!-- Hand -->
    <circle cx="28" cy="-4" r="5" fill="#5BA0E6"/>

    <!-- Motion lines -->
    <g stroke="#4A90D9" stroke-width="1.5" opacity="0.3" stroke-linecap="round">
      <line x1="-35" y1="10" x2="-50" y2="10"/>
      <line x1="-32" y1="20" x2="-52" y2="22"/>
      <line x1="-30" y1="30" x2="-48" y2="32"/>
    </g>
  </g>

  <!-- Small floating gem near character (diamond shape) -->
  <g transform="translate(300, 200)" filter="url(#glow)">
    <polygon points="0,-12 10,0 0,12 -10,0" fill="#F5C842" stroke="#E8B830" stroke-width="0.5"/>
    <polygon points="0,-12 4,0 0,5 -4,0" fill="#FFFFFF" opacity="0.3"/>
    <animateTransform attributeName="transform" type="translate" values="300,200;300,192;300,200" dur="2s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- Subtle speed / trail particles behind character -->
  <g fill="#4A90D9" opacity="0.15">
    <circle cx="310" cy="280" r="3"><animate attributeName="opacity" values="0.15;0.03;0.15" dur="1s" repeatCount="indefinite"/></circle>
    <circle cx="295" cy="290" r="2"><animate attributeName="opacity" values="0.12;0.02;0.12" dur="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="275" r="2.5"><animate attributeName="opacity" values="0.1;0.02;0.1" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="265" cy="285" r="1.5"><animate attributeName="opacity" values="0.08;0.01;0.08" dur="1.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>
