<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" font-family="'Hiragino Sans', 'Noto Sans JP', 'Consolas', sans-serif">
  <!-- background -->
  <rect width="820" height="200" fill="#1a1b23" rx="10"/>
  <!-- grid dots -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="#ffffff" opacity="0.08"/></pattern>
  <rect width="820" height="200" fill="url(#dots)" rx="10"/>
  <!-- NODE 1: Event ActorBeginOverlap -->
  <rect x="12" y="48" width="210" height="64" rx="6" fill="#2a2c3a" stroke="#5a3030" stroke-width="1"/>
  <rect x="12" y="48" width="210" height="24" rx="6" fill="#7b2020"/>
  <rect x="12" y="60" width="210" height="12" fill="#7b2020"/>
  <text x="36" y="65" font-size="11" font-weight="bold" fill="#ffffff">Event ActorBeginOverlap</text>
  <!-- exec out pin (triangle) -->
  <polygon points="222,70 230,76 222,82" fill="#ffffff"/>
  <text x="18" y="90" font-size="10" fill="#aaaaaa">Other Actor</text>
  <circle cx="222" cy="97" r="5" fill="none" stroke="#3fc" stroke-width="1.5"/>
  <text x="185" y="101" text-anchor="end" font-size="10" fill="#aaaaaa">Other Actor</text>
  <!-- wire exec 1→2 -->
  <path d="M230,76 C248,76 248,76 258,76" stroke="#ffffff" stroke-width="2" fill="none"/>
  <!-- NODE 2: Set Score -->
  <rect x="258" y="38" width="178" height="86" rx="6" fill="#2a2c3a" stroke="#1a4a6a" stroke-width="1"/>
  <rect x="258" y="38" width="178" height="24" rx="6" fill="#1a5276"/>
  <rect x="258" y="50" width="178" height="12" fill="#1a5276"/>
  <text x="280" y="55" font-size="11" font-weight="bold" fill="#ffffff">SET</text>
  <text x="310" y="55" font-size="10" fill="#88ccff">Score</text>
  <!-- exec in pin -->
  <polygon points="250,68 258,74 250,80" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
  <!-- exec out pin -->
  <polygon points="436,68 444,74 436,80" fill="#ffffff"/>
  <!-- data pins -->
  <circle cx="258" cy="96" r="5" fill="#3fc" stroke="#3fc" stroke-width="1"/>
  <text x="268" y="100" font-size="10" fill="#aaaaaa">Score</text>
  <text x="310" y="100" font-size="12" fill="#ffffff">0 + 1</text>
  <circle cx="436" cy="96" r="5" fill="#3fc" stroke="#3fc" stroke-width="1"/>
  <text x="420" y="100" text-anchor="end" font-size="10" fill="#aaaaaa">Score</text>
  <!-- wire exec 2→3 -->
  <path d="M444,74 C458,74 458,74 468,74" stroke="#ffffff" stroke-width="2" fill="none"/>
  <!-- NODE 3: Branch -->
  <rect x="468" y="38" width="130" height="100" rx="6" fill="#2a2c3a" stroke="#3a3a4a" stroke-width="1"/>
  <rect x="468" y="38" width="130" height="24" rx="6" fill="#2e3347"/>
  <rect x="468" y="50" width="130" height="12" fill="#2e3347"/>
  <text x="515" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Branch</text>
  <!-- exec in -->
  <polygon points="460,68 468,74 460,80" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
  <!-- condition pin -->

  <circle cx="468" cy="93" r="5" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
  <text x="478" y="97" font-size="10" fill="#aaaaaa">Score &gt;= 5</text>
  <!-- True out -->
  <polygon points="598,62 606,68 598,74" fill="#ffffff"/>
  <text x="585" y="70" text-anchor="end" font-size="10" fill="#aaaaaa">True</text>
  <!-- False out -->
  <polygon points="598,88 606,94 598,100" fill="#aaaaaa"/>
  <text x="585" y="96" text-anchor="end" font-size="10" fill="#666666">False</text>
  <!-- wire true → node4 -->
  <path d="M606,68 C620,68 620,62 630,62" stroke="#ffffff" stroke-width="2" fill="none"/>
  <!-- NODE 4: Print String (クリア！) -->
  <rect x="630" y="30" width="170" height="64" rx="6" fill="#2a2c3a" stroke="#1a4a6a" stroke-width="1"/>
  <rect x="630" y="30" width="170" height="24" rx="6" fill="#1a5276"/>
  <rect x="630" y="42" width="170" height="12" fill="#1a5276"/>
  <text x="652" y="47" font-size="11" font-weight="bold" fill="#ffffff">Print String</text>
  <polygon points="622,56 630,62 622,68" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="630" cy="80" r="5" fill="#e67e22" stroke="#e67e22" stroke-width="1"/>
  <text x="642" y="84" font-size="10" fill="#aaaaaa">In String</text>
  <text x="700" y="84" font-size="11" fill="#f39c12" font-weight="bold">&#x30AF;&#x30EA;&#x30A2;&#xFF01;</text>
  <!-- False wire → loop back label -->
  <path d="M606,94 C616,94 616,165 540,165 C464,165 464,148 468,135" stroke="#666666" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="520" y="178" text-anchor="middle" font-size="10" fill="#666666">&#x7D9A;&#x304F;&#x2026;</text>
</svg>
