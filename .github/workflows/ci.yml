name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: open-campus-unreal-90min-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Cache npm tool downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/AppData/Local/npm-cache
          key: ${{ runner.os }}-open-campus-unreal-90min-lint-tools-${{ hashFiles('.github/workflows/ci.yml', '.markdownlint.json') }}
      - name: markdownlint
        run: npx markdownlint-cli "**/*.md" --config .markdownlint.json --ignore AGENTS.md

  integration:
    runs-on: ubuntu-latest
    env:
      COURSE_CONTENT_SOURCE: '../course-content'
    steps:
      - name: Checkout course content
        uses: actions/checkout@v6
        with:
          path: course-content

      - name: Checkout course-docs-site
        uses: actions/checkout@v6
        with:
          repository: metyatech/course-docs-site
          ref: main
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Lint site against local content
        working-directory: site
        run: npm run lint

      - name: Build site against local content
        working-directory: site
        run: npm run build:verified
