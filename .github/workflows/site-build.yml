name: Site Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course content
        uses: actions/checkout@v4
        with:
          path: course-content

      - name: Checkout course-docs-site
        uses: actions/checkout@v4
        with:
          repository: metyatech/course-docs-site
          ref: main
          path: site

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install runtime
        working-directory: site
        run: npm ci

      - name: Build site against local content
        working-directory: site
        env:
          COURSE_CONTENT_SOURCE: ../course-content
        run: npm run build
